<!DOCTYPE html>
<html>

<head>

<title>SahiBuy</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<nav class="bg-blue-600 p-4 text-white flex justify-between">

<h1 class="text-2xl font-bold">SahiBuy</h1>

<a href="login.html">Login</a>

</nav>


<div class="max-w-5xl mx-auto mt-6 bg-white p-6 rounded shadow">

<h2 class="text-xl font-bold mb-3">Post Product</h2>

<input id="title" class="border p-2 w-full mb-2" placeholder="Product Name">

<input id="price" class="border p-2 w-full mb-2" placeholder="Price">

<input type="file" id="image" class="mb-2">

<textarea id="desc" class="border p-2 w-full mb-2" placeholder="Description"></textarea>

<button onclick="addProduct()" class="bg-green-600 text-white px-4 py-2 rounded">

Post Ad

</button>

</div>


<div class="max-w-6xl mx-auto mt-10">

<h2 class="text-2xl font-bold mb-4">Marketplace</h2>

<div id="products" class="grid md:grid-cols-3 gap-5"></div>

</div>

<script type="module" src="app.js"></script>

</body>

</html>
