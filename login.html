<!DOCTYPE html>
<html>

<head>

<title>SahiBuy Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-6 rounded shadow w-80">

<h2 class="text-xl font-bold mb-4">Login / Signup</h2>

<input id="email" placeholder="Email" class="border p-2 w-full mb-2">

<input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-3">

<button onclick="signup()" class="bg-green-600 text-white w-full py-2 mb-2">

Sign Up

</button>

<button onclick="login()" class="bg-blue-600 text-white w-full py-2">

Login

</button>

</div>

<script type="module" src="app.js"></script>

</body>

</html>
